<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Up Call &mdash; Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    // Apply saved theme before paint to avoid flash
    (function() {
      const t = localStorage.getItem('wuc_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body class="admin-page">

  <!-- =========================================================
       LOGIN PANEL
       ========================================================= -->
  <div id="loginPanel" class="login-overlay">
    <div class="login-card">
      <img src="/WakeUpCall.png" class="login-logo" alt="Wake Up Call">
      <h1>Agent Login</h1>
      <p class="login-sub">Sign in to manage groups &amp; links</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="inputUsername">Username</label>
          <input type="text" id="inputUsername" autocomplete="username" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label for="inputPassword">Password</label>
          <input type="password" id="inputPassword" autocomplete="current-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
        <p id="loginError" class="error-msg"></p>
      </form>

      <div class="sso-divider" id="ssoDivider" style="display:none"><span>or</span></div>
      <div id="googleSignInBtn"></div>
      <p id="googleError" class="error-msg"></p>
    </div>
  </div>

  <!-- =========================================================
       ADMIN PANEL
       ========================================================= -->
  <div id="adminPanel" style="display:none">

    <nav class="admin-nav">
      <img src="/TGT.png" style="height:36px;width:auto;display:block;margin-right:8px" alt="TGT">
      <span class="nav-brand">Wake Up Call Admin</span>
      <button class="nav-btn active" id="navGroups" onclick="showSection('groups')">Groups &amp; Links</button>
      <button class="nav-btn" id="navUsers" onclick="showSection('users')">Users</button>
      <span class="nav-spacer"></span>
      <span class="nav-user" id="navUsername"></span>
      <a href="/" target="_blank" class="nav-btn">View Site &#8599;</a>
      <button class="nav-btn theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="admin-body">

      <!-- Groups Section -->
      <div id="sectionGroups">
        <div class="section-header">
          <h2>Groups &amp; Links</h2>
          <button class="btn btn-primary btn-sm" onclick="openGroupModal(null)">+ Add Group</button>
        </div>
        <div id="groupsList"></div>
      </div>

      <!-- Users Section -->
      <div id="sectionUsers" style="display:none">
        <div class="section-header">
          <h2>Users</h2>
          <button class="btn btn-primary btn-sm" onclick="openUserModal(null)">+ Add User</button>
        </div>
        <table class="users-table" id="usersTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- =========================================================
       MODAL
       ========================================================= -->
  <div id="modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn" onclick="modalSave()">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('wuc_theme', next);
      updateThemeBtn();
    }
    function updateThemeBtn() {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? '☀ Light' : '☽ Dark';
    }
    updateThemeBtn();
  </script>
</body>
</html>
