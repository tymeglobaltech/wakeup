<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Up Call</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    (function() {
      const t = localStorage.getItem('wuc_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <img src="/TGT.png" class="logo-tgt" alt="Tyme Global Technologies">
    <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    <img src="/WakeUpCall.png" class="logo-wuc" alt="Wake Up Call Service">
  </header>

  <main class="page-main">
    <div class="groups-grid" id="groupsGrid">
      <div class="loading-msg">Loading&hellip;</div>
    </div>
  </main>

  <script>
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function safeHref(url) {
      const u = String(url || '').trim();
      return (u === '#' || u.startsWith('http://') || u.startsWith('https://')) ? u : '#';
    }

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('wuc_theme', next);
      updateThemeBtn();
    }

    function updateThemeBtn() {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀ Light' : '☽ Dark';
    }

    updateThemeBtn();

    fetch('/api/groups')
      .then(r => r.json())
      .then(groups => {
        const grid = document.getElementById('groupsGrid');
        grid.innerHTML = '';
        groups.sort((a, b) => a.order - b.order).forEach(group => {
          const col = document.createElement('div');
          col.className = 'group-col';

          const linksHtml = (group.links || []).map(l => {
            const href = safeHref(l.url);
            return `<li><a href="${esc(href)}" data-popup="${href !== '#' ? '1' : ''}" data-label="${esc(l.label)}">${esc(l.label)}</a></li>`;
          }).join('');

          col.innerHTML =
            `<div class="group-header" style="--hue:${esc(group.color)}">${esc(group.label)}</div>` +
            `<ul class="group-links">${linksHtml || '<li class="empty-placeholder">&nbsp;</li>'}</ul>`;

          col.querySelectorAll('a[data-popup="1"]').forEach(a => {
            a.addEventListener('click', e => {
              e.preventDefault();
              window.open(a.getAttribute('href'), 'popup', 'width=1200,height=600,left=100,top=100');
            });
          });

          grid.appendChild(col);
        });
      })
      .catch(() => {
        document.getElementById('groupsGrid').innerHTML =
          '<div class="loading-msg error">Failed to load. Is the server running?</div>';
      });
  </script>

</body>
</html>
